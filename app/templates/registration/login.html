<!DOCTYPE html>
<html>
  <head>
    <title>Login</title>
  </head>
  <body>
    <h1>Login</h1>
  {% if form.errors %}
      <p style="color:red;">Invalid username or password.</p>
    {% endif %}
    
    <form method="POST">
        {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Login</button>
    </form>

    <p>
      Don’t have an account?
      <a href="{% url 'register' %}">Sign up</a>
    </p>
  </body>
</html>
